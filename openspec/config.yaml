schema: spec-driven

context: |
  Project: expo-masonry-layout
  Description: High-performance masonry layout component for React Native and Expo applications
  Tech stack: TypeScript, React Native, Expo
  Build: tsc (TypeScript compiler)
  Linting: ts-standard
  Testing: Jest
  Source directory: src/
  Output directory: lib/
  Peer dependencies: React >=18, React Native >=0.70
  Repository: github.com/echowaves/expo-masonry-layout
  License: MIT
  Dependencies: Always use exact versions in package.json (no ^ or ~ prefixes)
  Package manager: npm

rules:
  proposal:
    - Keep proposals concise and focused
    - Always include a "Non-goals" section
  tasks:
    - Break tasks into small, independently testable steps
    - Each task should specify which files are affected
    - When adding or updating dependencies, always use exact versions (e.g., "1.2.3" not "^1.2.3" or "~1.2.3"). Use --save-exact with npm install.
  dependencies:
    - Do not add any new dependencies to the project unless the user explicitly requests or approves it. Solve problems using existing dependencies and built-in APIs first.
